<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Weather App</title>
    <link rel="stylesheet" href="./styles.css" />

    <!-- Font Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="main-container">
      <div id="text-box">
        <h1 class="main-text ubuntu-bold">Weather App</h1>
      </div>
      <div id="weather-box">
        <h2>Your weather for :</h2>
        <div id="weather-body">
          <h2 id="location"></h2>
          <div>
            <img src="" alt="weather icon" id="weather-icon" />
            <h2 id="main-temperature"></h2>
          </div>
          <div>
            <h2 id="feels-like"></h2>
            <h2 id="humidity"></h2>
            <h2 id="wind"></h2>
            <h2 id="wind-gust"></h2>
            <h2 id="weather-main"></h2>
          </div>
        </div>
        <div id="weather-end">
          <h2>Please Select weather from :</h2>
          <div id="weather-row">
            <div id="location-div">
              <label for="locations">Choose a Location:</label>
              <select name="locations" id="locations">
                <option value="" selected></option>
                <option value="paris">Paris</option>
                <option value="london">London</option>
                <option value="tokyo">Tokyo</option>
                <option value="los angeles">Los Angeles</option>
                <option value="chicago">Chicago</option>
                <option value="new york">New York</option>
              </select>
            </div>
            <button id="get-weather-btn">Get Weather</button>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js" defer></script>
  </body>

  <footer id="footer">
    <p>Who made this: Logan Payton</p>
    <p>
      <a href="mailto:logan.paytonbusiness@gmail.com"
        >logan.paytonbusiness@gmail.com</a
      >
    </p>
  </footer>
</html>
